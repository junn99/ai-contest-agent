name: Deploy WebApp to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # 매일 09:00 KST (00:00 UTC)
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Collect contests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INFOKE_TELEGRAM_BOT_TOKEN: ${{ secrets.INFOKE_TELEGRAM_BOT_TOKEN }}
          INFOKE_TELEGRAM_CHAT_ID: ${{ secrets.INFOKE_TELEGRAM_CHAT_ID }}
        run: uv run python -m src.main collect
        continue-on-error: true

      - name: Build webapp data
        run: bash scripts/build_webapp.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: webapp/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
